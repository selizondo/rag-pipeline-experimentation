# Baseline experiment grid: 3 chunking × 2 embedding × 3 retrieval = 18 configs
# Use 50 queries from qrels.json for evaluation.
#
# Retrieval methods:
#   bm25   — keyword-search baseline; no embedding required; embedding_model is irrelevant
#             but is required by the grid driver for uniform config structure
#   dense  — vector retrieval (dot-product / cosine over FAISS)
#   hybrid — alpha-weighted score fusion: alpha × dense + (1-alpha) × BM25
#
# Run order recommendation: run bm25 first (fastest, no GPU) to establish the
# keyword-search floor, then dense, then hybrid.

n_queries: 50

chunking_strategies:
  - strategy: fixed
    chunk_size: 512
    overlap: 64
  - strategy: recursive
    chunk_size: 512
    overlap: 100
  - strategy: sliding_window
    window_size: 10
    step: 5

embedding_models:
  - model: all-MiniLM-L6-v2
    batch_size: 16
  - model: all-mpnet-base-v2
    batch_size: 16

retrieval_methods:
  - method: bm25                 # keyword-search baseline — beat this before claiming retrieval improvement
    top_k: 5
  - method: dense
    top_k: 5
  - method: hybrid
    top_k: 5
    alpha: 0.6
